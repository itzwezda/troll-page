<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ты затролен</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #fff;
            user-select: none;
        }

        .troll {
            position: absolute;
            width: 60px;
            height: 60px;
            background-image: url('Тролфейс.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            animation: jump linear infinite;
            cursor: pointer;
            pointer-events: auto;
        }

        @keyframes jump {
            0% { transform: translateY(0) rotate(0deg); }
            20% { transform: translateY(-20px) rotate(12deg); }
            30% { transform: translateY(0) rotate(0deg); }
            40% { transform: translateY(-15px) rotate(-8deg); }
            50% { transform: translateY(0) rotate(0deg); }
            60% { transform: translateY(-25px) rotate(18deg); }
            70% { transform: translateY(0) rotate(0deg); }
            80% { transform: translateY(-10px) rotate(-12deg); }
            90% { transform: translateY(0) rotate(6deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }
    </style>
</head>
<body>

    <!-- Локальная музыка -->
    <audio id="trollSound" loop>
        <source src="Ты затролен.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('trollSound');
        let soundPlayed = false;

        // Попытка автовоспроизведения — срабатывает при первом взаимодействии
        function tryPlay() {
            if (!soundPlayed) {
                audio.volume = 1.0; // Максимальная громкость
                audio.play().then(() => {
                    soundPlayed = true;
                }).catch(err => {
                    // Если не получилось — пробуем при любом клике
                    document.body.addEventListener('click', () => {
                        audio.play().catch(() => {
                            alert('Не удалось включить музыку. Проверьте файл "Ты затролен.mp3"');
                        });
                    }, { once: true });
                });
            }
        }

        // Пытаемся включить при загрузке
        tryPlay();

        // Также пытаемся при первом касании или клике
        ['click', 'touchstart'].forEach(event => {
            document.body.addEventListener(event, tryPlay, { once: true });
        });

        // Остальной код — тролфейсы
        let trollCount = 0;

        function createTroll() {
            const troll = document.createElement('div');
            troll.classList.add('troll');
            troll.style.left = Math.random() * (window.innerWidth - 60) + 'px';
            troll.style.top = Math.random() * (window.innerHeight - 60) + 'px';
            troll.style.animationDuration = (0.3 + Math.random() * 0.3) + 's';

            troll.addEventListener('click', () => {
                troll.remove();
                for (let i = 0; i < 4; i++) createTroll();
                trollCount += 4;
                if (trollCount > 15) startSpawning(10);
            });

            document.body.appendChild(troll);
            trollCount++;
        }

        function startSpawning(interval = 20) {
            clearInterval(window.spawnInterval);
            window.spawnInterval = setInterval(() => {
                if (trollCount < 400) createTroll();
            }, interval);
        }

        // Старт
        for (let i = 0; i < 15; i++) createTroll();
        startSpawning(20);

        // Троллим консоль
        console.log = () => {
            alert('Ты в моём мире. Музыка играет. Тролфейсы повсюду.');
            for (let i = 0; i < 5; i++) createTroll();
        };
    </script>
</body>
</html>
